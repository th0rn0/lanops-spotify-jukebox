kind: pipeline
type: docker
name: service

trigger:
  event:
    - push
    - pull_request
    - tag

steps:

  - name: discord-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO Service - Build Started!\",\"url\":\"$DRONE_BUILD_LINK\",\"description\":\"$DRONE_COMMIT_MESSAGE\"}]}"
    when:
      event:
        - push
        - tag
      branch:
        - main

  - name: lint
    image: golang:1.24
    environment:
      GOFLAGS: -buildvcs=false
    commands:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - cd service
      - golangci-lint run --timeout=5m ./...

  - name: test
    image: golang:1.24
    commands:
      - cd service
      - go test ./...

  - name: build-push
    image: plugins/docker
    settings:
      repo: th0rn0/lanops-spotify-jukebox-service
      dockerfile: resources/docker/service/Dockerfile
      context: .
      platforms: linux/amd64,linux/arm64
      tags:
        - latest
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
    when:
      branch:
        - main
      event:
        - push

  - name: build-push-release
    image: plugins/docker
    settings:
      repo: th0rn0/lanops-spotify-jukebox-service
      dockerfile: resources/docker/service/Dockerfile
      context: .
      platforms: linux/amd64,linux/arm64
      tags:
        - latest
        - ${DRONE_TAG}
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
    when:
      event:
        - tag

  - name: build-pr
    image: plugins/docker
    settings:
      repo: th0rn0/lanops-spotify-jukebox-service
      dockerfile: resources/docker/service/Dockerfile
      context: .
      dry_run: true
    when:
      event:
        - pull_request

  - name: discord-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO Service - Build Success!\",\"url\":\"$DRONE_BUILD_LINK\",\"description\":\"$DRONE_COMMIT_MESSAGE\"}]}"
    when:
      event:
        - push
        - tag
      branch:
        - main
      status:
        - success

  - name: discord-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO Service - Build Failure!\",\"url\":\"$DRONE_BUILD_LINK\",\"description\":\"$DRONE_COMMIT_MESSAGE\"}]}"
    when:
      event:
        - push
        - tag
      branch:
        - main
      status:
        - failure

