kind: pipeline
type: docker
name: ci

trigger:
  event:
    - push
    - pull_request
    - tag

steps:

# ── Lint ──────────────────────────────────────────────────────────────────────

  - name: lint-service
    image: golangci/golangci-lint:v1.64.8
    commands:
      - cd service
      - golangci-lint run ./...

# ── Test ──────────────────────────────────────────────────────────────────────

  - name: test-service
    image: golang:1.24
    commands:
      - cd service
      - go test ./...

# ── Build & Push Service ──────────────────────────────────────────────────────

  - name: discord-build-service-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO Service - Build Started!\",\"url\":\"$DRONE_BUILD_LINK\",\"description\":\"$DRONE_COMMIT_MESSAGE\"}]}"
    when:
      event:
        - push
        - tag
      branch:
        - main

  - name: build-push-service
    image: plugins/docker
    settings:
      repo: th0rn0/lanops-spotify-jukebox-service
      dockerfile: resources/docker/service/Dockerfile
      context: .
      platforms: linux/amd64,linux/arm64
      tags:
        - latest
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
    when:
      branch:
        - main
      event:
        - push

  - name: build-push-service-release
    image: plugins/docker
    settings:
      repo: th0rn0/lanops-spotify-jukebox-service
      dockerfile: resources/docker/service/Dockerfile
      context: .
      platforms: linux/amd64,linux/arm64
      tags:
        - latest
        - ${DRONE_TAG}
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
    when:
      event:
        - tag

  - name: build-service-pr
    image: plugins/docker
    settings:
      repo: th0rn0/lanops-spotify-jukebox-service
      dockerfile: resources/docker/service/Dockerfile
      context: .
      dry_run: true
    when:
      event:
        - pull_request

  - name: discord-build-service-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO Service - Build Success!\",\"url\":\"$DRONE_BUILD_LINK\",\"description\":\"$DRONE_COMMIT_MESSAGE\"}]}"
    when:
      event:
        - push
        - tag
      branch:
        - main
      status:
        - success

  - name: discord-build-service-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO Service - Build Failure!\",\"url\":\"$DRONE_BUILD_LINK\",\"description\":\"$DRONE_COMMIT_MESSAGE\"}]}"
    when:
      event:
        - push
        - tag
      branch:
        - main
      status:
        - failure

# ── Build & Push UI ───────────────────────────────────────────────────────────

  - name: discord-build-ui-start
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO UI - Build Started!\",\"url\":\"$DRONE_BUILD_LINK\",\"description\":\"$DRONE_COMMIT_MESSAGE\"}]}"
    when:
      event:
        - push
        - tag
      branch:
        - main

  - name: build-push-ui
    image: plugins/docker
    environment:
      API_ENDPOINT:
        from_secret: api_endpoint
    settings:
      repo: th0rn0/lanops-spotify-jukebox-ui
      dockerfile: resources/docker/ui/Dockerfile
      context: .
      platforms: linux/amd64,linux/arm64
      tags:
        - latest
      build_args_from_env:
        - API_ENDPOINT
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
    when:
      branch:
        - main
      event:
        - push

  - name: build-push-ui-release
    image: plugins/docker
    environment:
      API_ENDPOINT:
        from_secret: api_endpoint
    settings:
      repo: th0rn0/lanops-spotify-jukebox-ui
      dockerfile: resources/docker/ui/Dockerfile
      context: .
      platforms: linux/amd64,linux/arm64
      tags:
        - latest
        - ${DRONE_TAG}
      build_args_from_env:
        - API_ENDPOINT
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
    when:
      event:
        - tag

  - name: build-ui-pr
    image: plugins/docker
    environment:
      API_ENDPOINT:
        from_secret: api_endpoint
    settings:
      repo: th0rn0/lanops-spotify-jukebox-ui
      dockerfile: resources/docker/ui/Dockerfile
      context: .
      dry_run: true
      build_args_from_env:
        - API_ENDPOINT
    when:
      event:
        - pull_request

  - name: discord-build-ui-success
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO UI - Build Success!\",\"url\":\"$DRONE_BUILD_LINK\",\"description\":\"$DRONE_COMMIT_MESSAGE\"}]}"
    when:
      event:
        - push
        - tag
      branch:
        - main
      status:
        - success

  - name: discord-build-ui-failure
    image: curlimages/curl:8.7.1
    failure: ignore
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        curl -s -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"embeds\":[{\"title\":\"$DRONE_REPO UI - Build Failure!\",\"url\":\"$DRONE_BUILD_LINK\",\"description\":\"$DRONE_COMMIT_MESSAGE\"}]}"
    when:
      event:
        - push
        - tag
      branch:
        - main
      status:
        - failure
